<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grok Chat Interface</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f5f7fb;
      background: #050608;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      width: 100%;
      background: radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 22%),
                  linear-gradient(180deg, #06080b 0%, #070b0f 35%, #040507 100%);
      color: #fff;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .page-shell {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: row;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 40%), rgba(1,3,6,0.95);
    }

    .sidebar {
      width: 260px;
      min-width: 260px;
      padding: 24px 20px;
      background: rgba(5, 8, 12, 0.96);
      border-right: 1px solid rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-area {
      flex: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 22px;
      padding: 32px 34px 24px;
      min-height: 0;
    }

    .sidebar .header {
      padding: 0;
      text-align: left;
      border-bottom: none;
    }

    .sidebar .header h2 {
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }

    .sidebar .controls {
      display: flex;
    }

    .conversation-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-width: thin;
    }

    .conversation-list::-webkit-scrollbar {
      width: 7px;
    }

    .conversation-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
    }

    .conversation-item {
      padding: 14px 12px;
      cursor: pointer;
      background: transparent;
      color: #f3f9ff;
      border-radius: 14px;
      border: 1px solid transparent;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .conversation-item:hover {
      background: rgba(255,255,255,0.05);
    }

    .conversation-item.active {
      background: rgba(95,124,255,0.16);
      border-color: rgba(95,124,255,0.25);
    }

    .conversation-item > div:first-child {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.3;
    }

    .conversation-item > div:last-child {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      margin-top: 6px;
      line-height: 1.2;
    }

    .chat-area {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 22px;
      padding: 32px 34px 24px;
      min-height: 0;
    }

    .chat-area .header {
      padding: 0;
      text-align: left;
      border-bottom: none;
    }

    .chat-area .header h1 {
      margin: 0;
      font-size: 2.1rem;
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: #f8fbff;
    }

    .chat-area .header p {
      margin: 12px 0 0;
      color: rgba(255,255,255,0.66);
      font-size: 0.95rem;
      max-width: 640px;
      line-height: 1.7;
    }

    .chat-window {
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
      min-height: 0;
      scroll-behavior: smooth;
      padding-right: 4px;
    }

    .chat-window::-webkit-scrollbar {
      width: 8px;
    }

    .chat-window::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
    }

    .message-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: flex-start;
    }

    .message-row.user {
      grid-template-columns: 1fr auto;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #fff;
      background: #3c50a0;
      flex-shrink: 0;
    }

    .avatar.user {
      background: linear-gradient(135deg, #24b47e, #1d8a6b);
    }

    .avatar.assistant {
      background: linear-gradient(135deg, #5f7cff, #3d4db2);
    }

    .bubble {
      padding: 16px 18px;
      border-radius: 20px;
      max-width: 760px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.65;
      box-shadow: none;
    }

    .bubble.user {
      justify-self: end;
      background: linear-gradient(135deg, rgba(31,148,121,0.22), rgba(31,148,121,0.12));
      color: #e8fbf3;
    }

    .bubble.assistant {
      background: rgba(255,255,255,0.06);
      color: #f7fbff;
    }

    .bubble pre {
      background: rgba(255,255,255,0.06);
      padding: 14px;
      border-radius: 14px;
      overflow: auto;
      margin: 10px 0 0;
    }

    .bubble code {
      background: rgba(255,255,255,0.08);
      padding: 3px 6px;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, 'Roboto Mono', 'Courier New', monospace;
      font-size: 0.94em;
    }

    .bubble.skeleton {
      background: rgba(255,255,255,0.07);
      color: transparent;
      position: relative;
      overflow: hidden;
    }

    .bubble.skeleton::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.12), rgba(255,255,255,0.02));
      animation: shine 1.35s infinite ease-in-out;
      transform: translateX(-100%);
    }

    .bubble.skeleton span {
      display: inline-block;
      width: 100%;
      height: 1em;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
    }

    @keyframes shine {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(100%); }
      100% { transform: translateX(100%); }
    }

    .input-panel {
      display: flex;
      justify-content: center;
      padding-top: 4px;
      border-top: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
    }

    .input-container {
      width: 100%;
      max-width: 820px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-input {
      width: 100%;
      min-height: 52px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #f5f9ff;
      font-size: 1rem;
      padding: 16px 18px;
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .chat-input::placeholder {
      color: rgba(255,255,255,0.55);
    }

    .chat-input:focus {
      border-color: rgba(95,124,255,0.45);
      background: rgba(255,255,255,0.08);
    }

    .send-button {
      border: none;
      border-radius: 999px;
      padding: 0 24px;
      min-height: 52px;
      font-size: 0.95rem;
      cursor: pointer;
      background: linear-gradient(135deg, #6c7cff, #4d62e5);
      color: #fff;
      transition: transform 0.15s ease, filter 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 12px 30px rgba(72,90,255,0.18);
    }

    .send-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .send-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .footer-note {
      color: rgba(255,255,255,0.55);
      font-size: 0.9rem;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="sidebar">
      <div class="header">
        <h2 style="margin:0;font-size:1.05rem">Conversations</h2>
      </div>

      <div class="controls">
        <button id="newChatBtn" class="send-button" style="flex:1;padding:8px 10px;min-height:40px">+ New Chat</button>
      </div>

      <div id="conversationList" class="conversation-list"></div>
    </div>

    <div class="chat-area">
      <div class="header">
        <h1 id="chatTitle">Grok Chat</h1>
      </div>

      <div id="chatWindow" class="chat-window"></div>

      <div class="input-panel">
        <div class="input-container">
          <input id="chatInput" class="chat-input" type="text" placeholder="Type your message..." autocomplete="off" />
          <button id="sendButton" class="send-button">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://js.puter.com/v2/"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
  <script>
    const chatWindow = document.getElementById('chatWindow');
    const chatInput = document.getElementById('chatInput');
    const sendButton = document.getElementById('sendButton');
    const conversationListEl = document.getElementById('conversationList');
    const chatTitle = document.getElementById('chatTitle');
    const newChatBtn = document.getElementById('newChatBtn');

    let conversationHistory = [];
    let currentConversationId = null;
    let db = null;
    let SQL = null;

    function appendMessage(role, text) {
      const row = document.createElement('div');
      row.className = `message-row ${role}`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${role}`;
      avatar.textContent = role === 'user' ? 'U' : 'G';

      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      const normalizedText = String(text || '').replace(/[\r\n]+/g, '\n').trim();
      // Render markdown for assistant messages, sanitize the resulting HTML
      try {
        const rawHtml = marked.parse(normalizedText);
        bubble.innerHTML = DOMPurify.sanitize(rawHtml);
      } catch (e) {
        bubble.textContent = normalizedText;
      }

      if (role === 'assistant') {
        row.append(avatar, bubble);
      } else {
        row.append(bubble, avatar);
      }

      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function formatDate(timestamp) {
      if (!timestamp) return '';
      const date = new Date(timestamp);
      const options = { year: 'numeric', month: 'long', day: '2-digit' };
      return date.toLocaleDateString(undefined, options);
    }

    function renderConversationList(rows) {
      conversationListEl.innerHTML = '';
      rows.forEach(r => {
        const item = document.createElement('div');
        item.className = 'conversation-item';
        item.dataset.id = r.id;
        item.innerHTML = `<div style="font-weight:600">${r.title || 'Untitled'}</div><div style="font-size:0.8rem;color:rgba(255,255,255,0.6)">${formatDate(r.updated_at)}</div>`;
        item.addEventListener('click', () => loadConversation(r.id));
        conversationListEl.appendChild(item);
      });
    }

    function setActiveConversationInList(id) {
      Array.from(conversationListEl.children).forEach(el => {
        el.classList.toggle('active', el.dataset.id == id);
      });
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      appendMessage('user', text);
      chatInput.value = '';
      chatInput.focus();
      sendButton.disabled = true;

      const now = new Date().toISOString();
      // ensure conversation exists
      if (!currentConversationId) {
        currentConversationId = createConversation('New chat');
        loadConversations();
      }

      addMessageToDB(currentConversationId, 'user', text, now);
      conversationHistory.push({ role: 'user', content: text });

      const skeletonRow = appendLoadingSkeleton();

      try {
        const response = await puter.ai.chat(conversationHistory, {
          model: 'x-ai/grok-4-1-fast'
        });

        const assistantText = response.message.content;
        const now2 = new Date().toISOString();
        addMessageToDB(currentConversationId, 'assistant', assistantText, now2);
        conversationHistory.push({ role: 'assistant', content: assistantText });
        appendMessage('assistant', assistantText);

        // update conversation title if untitled
        const convRow = db.exec(`SELECT title FROM conversations WHERE id = ${currentConversationId}`)[0];
        const titleVal = convRow ? convRow.values[0][0] : null;
        if (!titleVal || titleVal === 'New chat' || titleVal === 'Untitled') {
          generateAndSetTitle(currentConversationId);
        } else {
          updateConversationTimestamp(currentConversationId);
        }
      } catch (error) {
        appendMessage('assistant', 'Sorry, something went wrong.');
        console.error(error);
      } finally {
        if (skeletonRow) {
          skeletonRow.remove();
        }
        sendButton.disabled = false;
      }
    }

    function appendLoadingSkeleton() {
      const row = document.createElement('div');
      row.className = 'message-row assistant';

      const avatar = document.createElement('div');
      avatar.className = 'avatar assistant';
      avatar.textContent = 'G';

      const bubble = document.createElement('div');
      bubble.className = 'bubble assistant skeleton';
      bubble.innerHTML = `
        <span style="width: 110px; height: 1em; margin-bottom: 10px; display:block; border-radius: 8px;"></span>
        <span style="width: 85%; height: 1em; margin-bottom: 10px; display:block; border-radius: 8px;"></span>
        <span style="width: 70%; height: 1em; display:block; border-radius: 8px;"></span>
      `;

      row.append(avatar, bubble);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return row;
    }

    sendButton.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    chatInput.focus();

    // -----------------------
    // SQL.js helpers
    // -----------------------
    async function initDB() {
      SQL = await initSqlJs({ locateFile: file => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.wasm' });
      const saved = localStorage.getItem('puter_db');
      if (saved) {
        const binary = Uint8Array.from(atob(saved), c => c.charCodeAt(0));
        db = new SQL.Database(binary);
      } else {
        db = new SQL.Database();
      }

      // create tables if not exist
      db.run(`CREATE TABLE IF NOT EXISTS conversations(id INTEGER PRIMARY KEY AUTOINCREMENT, title TEXT, created_at TEXT, updated_at TEXT);
              CREATE TABLE IF NOT EXISTS messages(id INTEGER PRIMARY KEY AUTOINCREMENT, conversation_id INTEGER, role TEXT, content TEXT, created_at TEXT);
      `);
      saveDB();
      await loadConversations();
    }

    function saveDB() {
      const data = db.export();
      const str = String.fromCharCode.apply(null, data);
      const b64 = btoa(str);
      localStorage.setItem('puter_db', b64);
    }

    async function loadConversations() {
      const res = db.exec("SELECT id, COALESCE(title,'Untitled') as title, updated_at FROM conversations ORDER BY datetime(updated_at) DESC");
      const rows = [];
      if (res && res[0]) {
        const cols = res[0].columns;
        res[0].values.forEach(vals => {
          const r = {};
          vals.forEach((v, i) => r[cols[i]] = v);
          rows.push(r);
        });
      }
      renderConversationList(rows);
    }

    async function loadConversation(id) {
      currentConversationId = id;
      setActiveConversationInList(id);
      const res = db.exec(`SELECT role, content, created_at FROM messages WHERE conversation_id = ${id} ORDER BY id ASC`);
      const rows = [];
      if (res && res[0]) {
        res[0].values.forEach(vals => rows.push({ role: vals[0], content: vals[1], created_at: vals[2] }));
      }
      conversationHistory = rows.map(r => ({ role: r.role, content: r.content }));
      chatWindow.innerHTML = '';
      rows.forEach(r => appendMessage(r.role === 'assistant' ? 'assistant' : 'user', r.content));
      const titleRow = db.exec(`SELECT title FROM conversations WHERE id = ${id}`);
      if (titleRow && titleRow[0]) chatTitle.textContent = titleRow[0].values[0][0] || 'Grok Chat';
    }

    function createConversation(initialTitle) {
      const now = new Date().toISOString();
      db.run(`INSERT INTO conversations(title, created_at, updated_at) VALUES (?, ?, ?);`, [initialTitle || 'Untitled', now, now]);
      const idRes = db.exec('SELECT last_insert_rowid()');
      saveDB();
      const id = idRes && idRes[0] && idRes[0].values[0] ? idRes[0].values[0][0] : null;
      if (id) {
        awaitLoadConversationsLater();
      }
      return id;
    }

    // small helper to avoid sync issues when creating then immediately loading list
    function awaitLoadConversationsLater(){ setTimeout(()=>loadConversations(), 60); }

    function addMessageToDB(conversationId, role, content, created_at) {
      db.run(`INSERT INTO messages(conversation_id, role, content, created_at) VALUES (?, ?, ?, ?);`, [conversationId, role, content, created_at || new Date().toISOString()]);
      db.run(`UPDATE conversations SET updated_at = ? WHERE id = ?;`, [new Date().toISOString(), conversationId]);
      saveDB();
      loadConversations();
    }

    function updateConversationTimestamp(conversationId) {
      db.run(`UPDATE conversations SET updated_at = ? WHERE id = ?;`, [new Date().toISOString(), conversationId]);
      saveDB();
      loadConversations();
    }

    async function generateAndSetTitle(conversationId) {
      // Fetch first few messages as context
      const res = db.exec(`SELECT role, content FROM messages WHERE conversation_id = ${conversationId} ORDER BY id ASC LIMIT 8`);
      const rows = (res && res[0]) ? res[0].values.map(v => ({ role: v[0], content: v[1] })) : [];
      const msgs = [{role:'system', content:'Generate a concise 3-6 word title for the following conversation. Reply with only the title and nothing else.'}];

      rows.forEach(r => msgs.push({ role: r.role === 'assistant' ? 'assistant' : 'user', content: r.content }));
      
      try {
        const response = await puter.ai.chat(msgs, { model: 'x-ai/grok-4-1-fast' });
        const title = (response && response.message && response.message.content) ? response.message.content.trim().replace(/\n/g,' ') : 'Chat';
        db.run(`UPDATE conversations SET title = ? WHERE id = ?;`, [title, conversationId]);
        saveDB();
        loadConversations();
        if (currentConversationId == conversationId) chatTitle.textContent = title;
      } catch (e) {
        console.error('title gen failed', e);
      }
    }

    // New chat button
    newChatBtn.addEventListener('click', () => {
      const id = createConversation('New chat');
      // set a small timeout to allow list refresh then load
      setTimeout(()=>{
        loadConversations();
        if (id) loadConversation(id);
      }, 80);
    });

    // initialize DB
    initDB();
  </script>
</body>
</html>
